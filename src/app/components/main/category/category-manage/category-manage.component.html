<p-toast position="top-right"></p-toast>
<div class="max-w-7xl mx-auto bg-white rounded-lg shadow p-6 mt-10 relative z-10">
  <h2 class="text-2xl font-bold mb-4">
    {{ mode === 'create' ? ('main.category.categorymanage.add' | translate) : ('main.category.categorymanage.edit' | translate) }}
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-9 gap-6">
    <div class="flex flex-col col-span-4">
      <label for="category-name" class="font-bold text-sm text-gray-700 mb-2">
        {{ 'main.category.categorymanage.category' | translate }}
      </label>
      <input
        id="category-name"
     
        pInputText
        [(ngModel)]="criteria.name"
        name="category"
        required
        [placeholder]="'main.category.categorymanage.placeholder.category' | translate"
     >
    </div>

    <div class="flex flex-col col-span-4">
      <label for="category-code" class="font-bold text-sm text-gray-700 mb-2">
        {{ 'main.category.categorymanage.code' | translate }}
      </label>
      <input
        id="category-code"
      
        pInputText
        [(ngModel)]="criteria.code"
        name="code"
        required
        [placeholder]="'main.category.categorymanage.placeholder.code' | translate"
      />
    </div>

    <div class="flex flex-col col-span-1 md:col-span-1 items-center justify-end">
      <label for="category-status" class="font-bold text-sm text-gray-700 mb-2 whitespace-nowrap">
        {{ 'main.category.categorymanage.status' | translate }}
      </label>
      <div id="category-status" class="flex items-center h-10">
        <p-toggleswitch [(ngModel)]="criteria.active"></p-toggleswitch>
      </div>
    </div>
  </div>

  <div class="flex justify-end gap-3 mt-6">
    <p-button
      [label]="'common.cancel' | translate"
      icon="pi pi-times"
      styleClass="p-button-secondary"
      (onClick)="onCancel()"
    ></p-button>
    <p-button
      [label]="'common.save' | translate"
      icon="pi pi-check"
      type="submit"
      (onClick)="onSave()"
    ></p-button>
  </div>
</div>
