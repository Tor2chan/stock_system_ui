<div class="min-h-screen  bg-[#f0f0f0] relative overflow-hidden">
  <!-- พื้นหลังตกแต่ง -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
    <div class="absolute w-[650px] h-[650px] rounded-full bg-gray-100/50 shadow-inner shadow-gray-200 -left-60 -bottom-60"></div>
    <div class="absolute w-[750px] h-[750px] rounded-full bg-gray-200/50 shadow-lg shadow-gray-300 -right-60 -top-60"></div>
  </div>

  <div class="max-w-7xl mx-auto bg-white rounded-lg shadow p-6 mt-10 relative z-10">
    <h2 class="text-2xl font-bold mb-4">Stock</h2>

    <!-- Filters -->
    <div class="flex items-center gap-2 mb-4">

         <input type="text" pInputText placeholder="Search by name or code" (input)="onSearch()"
            class="px-4 py-2 rounded-lg border w-64" />
      
        <!-- <button (click)="filterType('all')" [ngClass]="{'bg-blue-500 text-white': selectedFilter==='all'}"
            class="px-4 py-2 bg-gray-200 rounded-lg font-semibold transition">
            All
        </button> -->

        <select [(ngModel)]="filterCategory" (change)="filterByCategory()" class="px-4 py-2 rounded-lg border">
            <option value="">Filter by Category</option>
            <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
        </select>
            <p-button (click)="onSearch()"
            class="px-4 py-2 font-semibold transition gap-2 ml-2">
            <i class="pi pi-search"></i>
            Search
            </p-button>

        <!-- ใช้ flex-grow เพื่อดันปุ่ม Add ไปขวาสุด -->
        <div class="flex-grow"></div>

             <p-button (click)="onManageCategory()" class="px-4 py-2 font-semibold transition">
                <i class="pi pi-plus"></i>
                Category
            </p-button>
            <p-button (click)="openPage('create')" class="px-4 py-2 font-semibold transition">
                <i class="pi pi-plus"></i>
                Stock
            </p-button>
    </div>

    <p-table 
    [value]="transactions" 
    showGridlines="true" 
    [paginator]="true" 
     [globalFilterFields]="['name', 'code', 'amount','price']" 
       
    [rows]="5"
        [tableStyle]="{ 'min-width': '50rem' }" 
        [rowsPerPageOptions]="[5, 10, 20]">
     
     
        <ng-template pTemplate="header">
            <tr>
                <th>No </th>
                <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
                <th pSortableColumn="code"> BatchCode <p-sortIcon field="code" /></th>
                <th pSortableColumn="amount">Amount <p-sortIcon field="amount" /></th>
                <th>Category <!-- <i class="pi pi-pencil cursor-pointer text-green-500 ml-2 "  (click)="onManageCategory()"></i>--> </th>
                <th pSortableColumn="price" >Price<p-sortIcon field="price" /></th>
                <th>Rceived Date</th>
                <th  style="text-align: center ">Expire</th>
                <th style="text-align: center ">Manage</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item let-rowIndex="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ item.name }}</td>
                <td>{{ item.code }}</td>
                <td>{{ item.amount }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.date }}</td>
                <td>{{ item.expire }}</td>

                <td class="px-4 py-2 justify-center flex">
                    <button class="text-blue-500 hover:text-blue-700 mr-2" (click)="openPage('edit', item)">
                        <i class="pi pi-pencil"></i>
                    </button>
                    <button class="text-red-500 hover:text-red-700 mr-2" (click)="deleteTransaction(item.id)">
                        <i class="pi pi-trash"></i>
                    </button>
                       <button class="text-yellow-400 hover:text-yellow-700" (click)="onOpenEdit(item)">
                        <i class="pi pi-shopping-cart"></i>
                    </button>
                </td>
            </tr>
        </ng-template>
    </p-table>

</div>

<p-dialog [(visible)]="visibleEdit" [modal]="true"
    [style]="{ width: '30vw', maxWidth: '30%', border: '1px solid #ccc' }"
    [contentStyle]="{ height: '100%', overflow: 'hidden' }" [draggable]="false" [resizable]="false">

    <div class="text-center">
        <div class=""><i class="pi pi-info-circle" style="font-size: 6rem; opacity: 0.5;"></i></div>
        <div class="mt-4">Add to Cart</div>
    </div>
    <div>

          <input type="text" pInputText placeholder="Amount" (input)="onSearch()"
            class="px-4 py-2 rounded-lg border w-full" />
    </div>

    <div class="text-center mt-4">
        <p-button [label]="'ยกเลิก'" icon="pi pi-times" styleClass="p-button-secondary p-button-sm " size="small"
            (onClick)="onCloseEdit()">
        </p-button>

        <p-button [label]="'ยืนยัน'" size="small" (onClick)="onConfirmEdit()">
        </p-button>
    </div>
</p-dialog>
