<div class="max-w-7xl mx-auto bg-white rounded-lg shadow-lg p-6 mt-10 relative z-10">
  <h2 class="text-2xl font-bold mb-4">
    {{ mode === 'create' ? ('main.stock.stockdetail.stockdetailmanage.addTitle' | translate) : ('main.stock.stockdetail.stockdetailmanage.editTitle' | translate) }}
  </h2>

  <form (ngSubmit)="onSubmit()" #stockForm="ngForm" class="p-fluid">
    <!-- Name / Batch Code -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="flex flex-col">
        <label for="name" class="font-semibold mb-2">
          {{ 'main.stock.stockdetail.stockdetailmanage.nameLabel' | translate }}
        </label>
        <input
          id="name"
          type="text"
          pInputText
          [(ngModel)]="stock.name"
          name="name"
          required
          [placeholder]="'main.stock.stockdetail.stockdetailmanage.namePlaceholder' | translate"
          class="w-full"
        />
      </div>

      <div class="flex flex-col">
        <label for="code" class="font-semibold mb-2">
          {{ 'main.stock.stockdetail.stockdetailmanage.batchCodeLabel' | translate }}
        </label>
        <input
          id="code"
          type="text"
          pInputText
          [(ngModel)]="stock.code"
          name="code"
          required
          [placeholder]="'main.stock.stockdetail.stockdetailmanage.batchCodePlaceholder' | translate"
          class="w-full"
        />
      </div>
    </div>

    <!-- Amount / Price -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="flex flex-col">
        <label for="amount" class="font-semibold mb-2">
          {{ 'main.stock.stockdetail.stockdetailmanage.amountLabel' | translate }}
        </label>
        <p-inputNumber
          name="amount"
          inputId="amount"
          [min]="0"
          mode="decimal"
          required
          [placeholder]="'main.stock.stockdetail.stockdetailmanage.amountPlaceholder' | translate"
          class="w-full"
        ></p-inputNumber>
      </div>

      <div class="flex flex-col">
        <label for="price" class="font-semibold mb-2">
          {{ 'main.stock.stockdetail.stockdetailmanage.priceLabel' | translate }}
        </label>
        <p-inputNumber
          name="price"
          inputId="price"
          mode="currency"
          currency="THB"
          locale="th-TH"
          [placeholder]="'main.stock.stockdetail.stockdetailmanage.pricePlaceholder' | translate"
          class="w-full"
        ></p-inputNumber>
      </div>
    </div>

    <!-- Date / Expire -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="flex flex-col">
        <label for="date" class="font-semibold mb-2">
          {{ 'main.stock.stockdetail.stockdetailmanage.receivedDateLabel' | translate }}
        </label>
        <p-datepicker
          class="w-full"
          [(ngModel)]="stock.date"
          name="date"
          dateFormat="yy-mm-dd"
          showIcon="true"
          [placeholder]="'main.stock.stockdetail.stockdetailmanage.receivedDatePlaceholder' | translate"
          [style]="{ width: '100%' }"
        ></p-datepicker>
      </div>

      <div class="flex flex-col">
        <label for="expire" class="font-semibold mb-2">
          {{ 'main.stock.stockdetail.stockdetailmanage.expireDateLabel' | translate }}
        </label>
        <p-datepicker
          [(ngModel)]="stock.expire"
          name="expire"
          dateFormat="yy-mm-dd"
          showIcon="true"
          [placeholder]="'main.stock.stockdetail.stockdetailmanage.expireDatePlaceholder' | translate"
          [style]="{ width: '100%' }"
        ></p-datepicker>
      </div>
    </div>

    <!-- Category -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="flex flex-col">
        <label for="category" class="font-semibold mb-2">
          {{ 'main.stock.stockdetail.stockdetailmanage.categoryLabel' | translate }}
        </label>
    <p-select [options]="categories" [(ngModel)]="stock.category" [showClear]="true"
          placeholder="{{ 'main.stock.stockmain.stockmainmanage.selectCategory' | translate }}"
          class="w-full border rounded-lg h-[42px]"></p-select>

      </div>
    </div>

    <!-- Buttons -->
    <div class="flex justify-end gap-3 mt-6">
      <p-button
        [label]="'common.cancel' | translate"
        icon="pi pi-times"
        styleClass="p-button-secondary"
        (onClick)="onCancel()"
      ></p-button>

      <p-button
        [label]="'common.save' | translate"
        icon="pi pi-check"
        type="submit"
      ></p-button>
    </div>
  </form>
</div>
