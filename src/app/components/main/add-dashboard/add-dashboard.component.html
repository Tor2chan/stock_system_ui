<div class="max-w-6xl mx-auto bg-white rounded-lg shadow p-6 mt-10">
  <h2 class="text-2xl font-semibold mb-6">
    {{ isEdit ? 'แก้ไขรายการ' : 'เพิ่มรายการใหม่' }}
  </h2>

  <form [formGroup]="form" class="grid grid-cols-1 lg:grid-cols-2 gap-6" (ngSubmit)="onSubmit()">

    <!-- วันที่ -->
    <div class="w-full">
      <label class="block mb-1 font-medium">วันที่ <span class="text-red-500">*</span></label>
      <p-calendar 
        dateFormat="yy-mm-dd" 
        placeholder="กรุณาเลือกวันที่"
        styleClass="w-full h-12">
      </p-calendar>
      <small *ngIf="form.controls['date'].invalid && form.controls['date'].touched" class="p-error">
        กรุณาเลือกวันที่
      </small>
    </div>

    <!-- หมวดหมู่ -->
    <div class="w-full">
      <label class="block mb-1 font-medium">หมวดหมู่ <span class="text-red-500">*</span></label>
      <select formControlName="category" class="w-full p-inputtext h-12 border border-gray-300 rounded">
        <option value="" disabled selected>กรุณาเลือกหมวดหมู่</option>
        <option *ngFor="let item of categoryOptions" [value]="item.value">{{ item.label }}</option>
      </select>
      <small *ngIf="form.controls['category'].invalid && form.controls['category'].touched" class="p-error">
        กรุณาเลือกหมวดหมู่
      </small>
    </div>

    <!-- ประเภท -->
    <div class="w-full">
      <label class="block mb-1 font-medium">ประเภท <span class="text-red-500">*</span></label>
      <select formControlName="type" class="w-full p-inputtext h-12 border border-gray-300 rounded">
        <option value="" disabled selected>กรุณาเลือกประเภท</option>
        <option *ngFor="let item of typeOptions" [value]="item.value">{{ item.label }}</option>
      </select>
      <small *ngIf="form.controls['type'].invalid && form.controls['type'].touched" class="p-error">
        กรุณาเลือกประเภท
      </small>
    </div>

    <!-- จำนวนเงิน -->
    <div class="w-full">
      <label class="block mb-1 font-medium">จำนวนเงิน <span class="text-red-500">*</span></label>
      <p-inputNumber
        formControlName="amount"
        mode="decimal"
        placeholder="กรุณากรอกจำนวนเงิน"
        inputStyleClass="w-full h-12 p-2"
        styleClass="w-full">
      </p-inputNumber>
      <small *ngIf="form.controls['amount'].invalid && form.controls['amount'].touched" class="p-error">
        กรุณากรอกจำนวนเงิน
      </small>
    </div>
    <p-divider type="dashed" class="lg:col-span-2"></p-divider>

    <!-- คำอธิบาย -->
    <div class="lg:col-span-2">
      <label class="block mb-1 font-medium">คำอธิบาย</label>
      <textarea 
        pInputText
        formControlName="description" 
        class="w-full h-24 resize-none p-2 border border-gray-300 rounded"
        placeholder="กรุณาระบุเพิ่มเติม (ไม่บังคับ)">
      </textarea>
    </div>

    <!-- ปุ่ม -->
   <div class="flex  lg:justify-center lg:col-span-2 gap-4 ">
        <div >
            <p-button label='บันทึก' icon="pi pi-save"
                styleClass="p-button-primary p-button-sm" size="small" [disabled]="processing"
                (onClick)="onSave()"></p-button>
        </div>
        <div>
            <p-button label='ยกเลิก' icon="pi pi-times" variant="outlined"
                styleClass="p-button-primary p-button-sm" size="small" [disabled]="processing"
                (onClick)="onBack()"></p-button>
        </div>
    </div>

  </form>
</div>
