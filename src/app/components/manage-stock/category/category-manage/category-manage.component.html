<h3 class="text-primary font-blod">
    {{ mode === 'create' ? 'เพิ่ม' : 'แก้ไข' }}Category
</h3>

<div class="card">
    <p-table [value]="item" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template #header>
            <tr>
                <th>ลำดับ</th>
                <th>code</th>
                <th>Catetory</th>
            </tr>
        </ng-template>
        <ng-template #body let-item>
            <tr>
                <td>{{ item.rowNum }}</td>
                <td>{{ item.code }}</td>
                <td>{{ item.name }}</td>
            </tr>
        </ng-template>
    </p-table>
</div>
