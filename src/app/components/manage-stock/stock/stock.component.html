<div class="max-w-6xl mx-auto bg-white rounded-lg shadow p-6 mt-10]">
    <h2 class="text-2xl font-bold mb-4">Stock</h2>



    <!-- Filters -->
    <div class="flex items-center gap-2 mb-4">

         <input type="text" pInputText placeholder="Search by name or code" (input)="onSearch()"
            class="px-4 py-2 rounded-lg border w-64" />
      
        <!-- <button (click)="filterType('all')" [ngClass]="{'bg-blue-500 text-white': selectedFilter==='all'}"
            class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold transition">
            All
        </button> -->

        <select [(ngModel)]="filterCategory" (change)="filterByCategory()" class="px-4 py-2 rounded-lg border">
            <option value="">Filter by Category</option>
            <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
        </select>
          <button (click)="onSearch()"
            class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold transition gap-2 ml-2">
            <i class="pi pi-search"></i>
            Search
        </button>

        <!-- ใช้ flex-grow เพื่อดันปุ่ม Add ไปขวาสุด -->
        <div class="flex-grow"></div>

        <button (click)="onAdd()" class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold transition">
            <i class="pi pi-plus"></i>
            Add
        </button>
        
    </div>



    <p-table [value]="transactions" showGridlines="true" [paginator]="true" [rows]="5"
        [tableStyle]="{ 'min-width': '50rem' }" [rowsPerPageOptions]="[5, 10, 20]">
        <ng-template pTemplate="header">
            <tr>
                <th>No</th>
                <th>Name</th>
                <th>BatchCode</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Price</th>
                <th>Date</th>
                <th>Expire</th>
                <th >Manage</th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-item let-rowIndex="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ item.name }}</td>
                <td>{{ item.code }}</td>
                <td>{{ item.amount }}</td>
                <td>{{ item.category }}</td>
                <td>{{ item.price }}</td>
                <td>{{ item.date }}</td>
                <td>{{ item.expire }}</td>

                <td class="px-4 py-2 text-center">
                    <button class="text-blue-500 hover:text-blue-700 mr-2" (click)="onOpenEdit(item)">
                        <i class="pi pi-pencil"></i>
                    </button>
                    <button class="text-red-500 hover:text-red-700" (click)="deleteTransaction(item.id)">
                        <i class="pi pi-trash"></i>
                    </button>
                </td>
            </tr>
        </ng-template>
    </p-table>

</div>

<p-dialog [(visible)]="visibleEdit" [modal]="true"
    [style]="{ width: '30vw', maxWidth: '30%', border: '1px solid #ccc' }"
    [contentStyle]="{ height: '100%', overflow: 'hidden' }" [draggable]="false" [resizable]="false">

    <div class="text-center">
        <div class=""><i class="pi pi-info-circle" style="font-size: 6rem; opacity: 0.5;"></i></div>
        <div class="mt-4">Edit</div>
    </div>

    <div class="text-center mt-4">
        <p-button [label]="'ยกเลิก'" icon="pi pi-times" styleClass="p-button-secondary p-button-sm" size="small"
            (onClick)="onCloseEdit()">
        </p-button>

        <p-button [label]="'ยืนยัน'" size="small" (onClick)="onConfirmEdit()">
        </p-button>
    </div>
</p-dialog>
