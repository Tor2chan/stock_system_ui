<div class="min-h-screen flex items-center justify-center bg-gray-900 relative overflow-hidden p-4">
  <!-- Background Layer -->
  <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-indigo-950 via-gray-900 to-indigo-950 opacity-95"></div>

  <!-- Decorative Circles -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
    <div class="absolute w-[650px] h-[650px] rounded-full bg-white/5 shadow-inner shadow-white/10 -left-60 -bottom-60 animate-pulse-slow"></div>
    <div class="absolute w-[750px] h-[750px] rounded-full bg-white/10 shadow-lg shadow-white/5 -right-60 -top-60 animate-pulse-slow delay-500"></div>
  </div>

  <!-- 🔤 Language Toggle Button (Top-right corner) -->
  <div class="absolute top-4 right-4 z-20 flex items-center gap-2">
    <span class="text-white text-sm font-semibold">{{ 'login.welcome' | translate }}
</span>
    <p-button 
      icon="pi pi-language" 
      (click)="toggleLanguage()" 
      rounded 
      styleClass="p-button-text p-button-rounded text-white hover:text-indigo-400"
      tooltip="Change Language">
    </p-button>
  </div>

  <!-- Main Login Card -->
  <div class="relative z-10 w-full max-w-sm bg-white/5 backdrop-blur-xl rounded-3xl shadow-2xl shadow-indigo-800/50 border border-white/10 p-10 text-white transform transition-all duration-500 hover:scale-[1.02]">
    
    <!-- Logo -->
    <div class="mb-10 flex justify-center">
      <div class="flex items-center justify-center w-28 h-28 rounded-full bg-gradient-to-br from-indigo-500 to-purple-400 shadow-2xl shadow-indigo-500/70 border-4 border-white/20 transform hover:scale-105 transition-all duration-300">
        <i class="pi pi-shopping-cart text-6xl text-white"></i>
      </div>
    </div>

    <!-- Header -->
    <h2 class="text-3xl font-extrabold text-white mb-2 text-center tracking-wider">
      {{ 'login.welcome' | translate }}
    </h2>
    <p class="text-white/70 mb-8 text-center text-sm font-light whitespace-pre-line">
      {{ 'login.slogan' | translate }}
    </p>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-6">
      <!-- Username -->
      <div class="text-left">
        <label class="block text-sm mb-1 text-white/80 font-medium tracking-wider">
          {{ 'login.username' | translate }}
        </label>
        <input
          pInputText
          [(ngModel)]="username"
          name="username"
          placeholder="{{ 'login.username' | translate }}"
          class="w-full bg-transparent text-white placeholder-white/60 border-none outline-none px-4 py-3 rounded-xl"
          style="color-scheme: dark;"
        />
      </div>

      <!-- Password -->
      <div class="text-left">
        <label class="block text-sm mb-1 text-white/80 font-medium tracking-wider">
          {{ 'login.password' | translate }}
        </label>
        <p-password
          [(ngModel)]="password"
          name="password"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="{{ 'login.password' | translate }}"
          inputStyleClass="w-full bg-transparent text-white placeholder-white/60 border-none outline-none px-4 py-3 rounded-xl"
          styleClass="w-full border-none"
        ></p-password>
      </div>

      <!-- Error -->
      <p *ngIf="errorMessage" class="text-red-400 text-sm text-left font-semibold">
        {{ errorMessage }}
      </p>

      <!-- Buttons -->
      <div class="space-y-4 flex flex-col items-center">
        <button
          pButton
          type="submit"
          [disabled]="isLoading"
          [label]="isLoading ? ('login.loggingIn' | translate) : ('login.login' | translate)"
          icon="pi pi-sign-in"
          class="w-11/12 rounded-xl font-bold tracking-wider py-3.5 bg-green-400 hover:bg-green-300 shadow-xl shadow-green-500/50 hover:shadow-2xl hover:scale-[1.01] transition-all duration-300"
        ></button>

        <button
          pButton
          type="button"
          [label]="'login.signUp' | translate"
          icon="pi pi-user-plus"
          class="w-11/12 rounded-xl text-white font-semibold tracking-wider py-3 border border-purple-400 
                 bg-purple-600 hover:bg-purple-700 shadow-lg shadow-purple-500/30 transition-all duration-300"
          (click)="goToRegister()"
        ></button>
      </div>

      <!-- Forgot Password -->
      <div class="mt-4 text-center">
        <a routerLink="/forgot-password"
          class="text-white/60 text-sm hover:underline hover:text-white transition-all duration-300 font-light">
          {{ 'login.forgot' | translate }}
        </a>
      </div>
    </form>
  </div>
</div>
