<!-- Dark Background and Animated Elements -->
<div class="min-h-screen flex items-center justify-center bg-gray-900 relative overflow-hidden p-4">
  <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-indigo-950 via-gray-900 to-indigo-950 opacity-95"></div>

  <!-- Decorative Orbs -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
    <div class="absolute w-[650px] h-[650px] rounded-full bg-white/5 shadow-inner shadow-white/10 -left-60 -bottom-60 animate-pulse-slow"></div>
    <div class="absolute w-[750px] h-[750px] rounded-full bg-white/10 shadow-lg shadow-white/5 -right-60 -top-60 animate-pulse-slow delay-500"></div>
  </div>
  <div class="absolute top-4 right-4 z-20 flex items-center gap-2">
  <p-button 
      icon="pi pi-language" 
      (click)="toggleLanguage()" 
      rounded 
      styleClass="p-button-text p-button-rounded text-white hover:text-indigo-400 absolute top-4 right-4"
      tooltip="Change Language">
  </p-button>
</div>

  <!-- Main Forgot Password Card (Glassmorphism) -->
  <div class="relative z-10 w-full max-w-md bg-white/5 backdrop-blur-xl rounded-3xl shadow-2xl shadow-purple-800/50 border border-white/10 p-8 sm:p-10 text-white transform transition-all duration-500 hover:scale-[1.02]">
    
    <!-- Icon and Header Section -->
    <div class="mb-8 flex justify-center">
        <div class="flex items-center justify-center w-24 h-24 rounded-full bg-gradient-to-br from-purple-500 to-pink-400 shadow-2xl shadow-purple-500/70 border-4 border-white/20 transform hover:scale-105 transition-all duration-300">
            <i class="pi pi-lock text-5xl text-white"></i>
        </div>
    </div>
    
    <h2 class="text-3xl font-extrabold text-white mb-2 text-center tracking-wider">
        {{ 'forgot.title' | translate }}
    </h2>
    <p class="text-white/70 mb-8 text-center text-sm font-light">
        {{ 'forgot.description' | translate }}
    </p>

    <!-- Message Alerts -->
    <div class="space-y-4 mb-4">
        <p-message *ngIf="errorMessage" severity="error" [text]="errorMessage | translate" class="block"></p-message>
        <p-message *ngIf="successMessage" severity="success" [text]="successMessage | translate" class="block"></p-message>
    </div>

    <!-- Form Start -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <!-- Email -->
        <div class="text-left">
            <label for="email" class="block text-sm mb-1 text-white/80 font-medium tracking-wider">
              {{ 'forgot.emailLabel' | translate }}
            </label>
            <div class="relative p-input-icon-left w-full border border-white/20 rounded-xl overflow-hidden hover:border-white/50 transition duration-300">
                <i class="pi pi-envelope text-white/60 ml-3 z-20 absolute top-1/2 -translate-y-1/2"></i>
                <input 
                    id="email" 
                    type="email" 
                    pInputText 
                    formControlName="email" 
                    placeholder="{{ 'forgot.emailPlaceholder' | translate }}"
                    class="w-full bg-transparent text-white placeholder-white/60 border-none outline-none px-4 py-3 pl-10"
                    style="color-scheme: dark;"
                >
            </div>
            <small class="p-error block mt-1 text-red-400" 
                *ngIf="f['email'].invalid && (f['email'].dirty || f['email'].touched)">
                <span *ngIf="f['email'].errors?.['required']">{{ 'forgot.errorRequired' | translate }}</span>
                <span *ngIf="f['email'].errors?.['email']">{{ 'forgot.errorInvalidEmail' | translate }}</span>
            </small>
        </div>

        <!-- Send Link Button -->
        <div class="space-y-4 flex flex-col items-center pt-4">
            <p-button 
                label="{{ 'forgot.sendLink' | translate }}" 
                type="submit" 
                styleClass="w-full rounded-xl font-bold tracking-wider py-3.5 text-gray-900 transition-all duration-300 shadow-xl shadow-purple-500/50 hover:shadow-2xl hover:scale-[1.01] bg-purple-400 hover:bg-purple-300"
                [disabled]="forgotPasswordForm.invalid"
            ></p-button>
        </div>

    </form>
    <!-- Form End -->

    <!-- Links Section -->
    <div class="mt-8 text-center text-sm">
        <a routerLink="/login" class="text-purple-400 hover:text-purple-300 font-semibold cursor-pointer transition duration-200">
          {{ 'forgot.backToLogin' | translate }}
        </a>
    </div>
    
  </div>
</div>
