<div class="max-w-lg mx-auto bg-white rounded-lg shadow-lg p-6 mt-10 relative z-10">
  <h2 class="text-2xl font-bold mb-4">
    {{ mode === 'create' ? 'เพิ่มยูสเซอร์' : 'แก้ไขยูสเซอร์' }}
  </h2>
  <div class="flex flex-col gap-6 mb-6 items-center">
    <div class="flex flex-col w-full max-w-md">
      <label for="name" class="font-semibold mb-2">Name</label>
      <input id="name" type="text" pInputText [(ngModel)]="stock.name" name="name" required placeholder="Enter name"
        class="w-full" />
    </div>
    <div class="flex flex-col w-full max-w-md">
      <label for="username" class="font-semibold mb-2">Username</label>
      <input id="username" type="text" pInputText [(ngModel)]="stock.username" name="username" required
        placeholder="Enter username" class="w-full" />
    </div>
    <div class="flex flex-col w-full max-w-md">
      <label for="password" class="font-semibold mb-2">Password</label>
      <input id="password" type="text" pInputText [(ngModel)]="stock.password" name="password" required
        placeholder="Enter password" class="w-full" />
    </div>
    <div class="flex flex-col md:flex-row gap-6 w-full max-w-md mb-6">
      <!-- Role -->
      <div class="flex flex-col flex-1 items-center">
        <label class="font-semibold mb-2 text-center w-full">Role</label>
        <div class="flex justify-center gap-4 w-full">
          <label class="flex items-center cursor-pointer">
            <input type="radio" name="role" [(ngModel)]="stock.role" value="Admin" class="mr-2" />
            Admin
          </label>
          <label class="flex items-center cursor-pointer">
            <input type="radio" name="role" [(ngModel)]="stock.role" value="User" class="mr-2" />
            User
          </label>
        </div>
      </div>

      <!-- Status -->
      <div class="flex flex-col flex-1 items-center">
        <label for="status" class="font-semibold mb-2 text-center w-full">Status</label>
        <div class="flex justify-center items-center gap-3 w-full">
          <p-inputSwitch [(ngModel)]="stock.status" inputId="status" />
          <span>{{ stock.status ? 'Active' : 'Inactive' }}</span>
        </div>
      </div>
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <p-button label="Cancel" icon="pi pi-times" styleClass="p-button-secondary" (onClick)="onCancel()"></p-button>
      <p-button label="Save" icon="pi pi-check" type="submit"></p-button>
    </div>
  </div>
</div>
