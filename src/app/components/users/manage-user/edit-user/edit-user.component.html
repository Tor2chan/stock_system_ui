<div class="max-w-7xl mx-auto bg-white rounded-lg shadow-lg p-6 mt-10 relative z-10">
  <h2 class="text-2xl font-bold mb-4">User</h2>

  <!-- Filters -->
  <div class="flex items-center gap-2 mb-4">
    <input type="text" pInputText placeholder="{{ 'stockmainsearch.searchPlaceholder' | translate }}"
      (input)="onSearch()" class="px-4 py-2 rounded-lg border w-64" />

    <p-button (click)="onSearch()" class="px-4 py-2 font-semibold transition gap-2 ml-2">
      <i class="pi pi-search"></i>
      {{ 'stockmainsearch.search' | translate }}
    </p-button>

    <div class="flex-grow"></div>

    <p-button (click)="openPage('create')" class="px-4 py-2 font-semibold transition">
      <i class="pi pi-plus"></i>
      User
    </p-button>
  </div>

  <!-- Table -->
  <p-table [value]="users" [paginator]="true" [globalFilterFields]="['name', 'role', 'status']" [rows]="5"
    [tableStyle]="{ 'min-width': '60rem' }" [rowsPerPageOptions]="[5, 10, 20]">
    <ng-template pTemplate="header">
      <tr>
        <th style="text-align: center">No</th>
        <th pSortableColumn="name" style="text-align: center; position: relative; cursor:pointer;"
          (click)="sortTable('name', sortOrder === 'asc' && sortField === 'name' ? 'desc' : 'asc')">
          <span style="display: flex; align-items: center; width: 100%;">
            <span style="flex:1; text-align: center;">Username</span>
            <span style="margin-left: auto; display: flex; flex-direction: column; align-items: flex-end;">
              <i class="pi pi-sort-up-fill" style="cursor:pointer;"
                [ngStyle]="{ color: sortField === 'name' && sortOrder === 'asc' ? '#1976d2' : '#bdbdbd' }"></i>
              <i class="pi pi-sort-down-fill" style="cursor:pointer; margin-top:-6px;"
                [ngStyle]="{ color: sortField === 'name' && sortOrder === 'desc' ? '#1976d2' : '#bdbdbd' }"></i>
            </span>
          </span>
        </th>
        <th style="text-align: center">Name</th>
        <th style="text-align: center">Role</th>
        <th style="text-align: center">Status</th>
        <th style="text-align: center">{{ 'stockmainsearch.manage' | translate }}</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-item let-rowIndex="rowIndex">
      <tr>
        <td style="text-align: center; vertical-align: middle;">{{ rowIndex + 1 }}</td>
        <td style="text-align: center; vertical-align: middle;">{{ item.user }}</td>
        <td style="text-align: center; vertical-align: middle;">{{ item.name }}</td>
        <td style="text-align: center; vertical-align: middle;">{{ item.role }}</td>
        <td style="text-align: center; vertical-align: middle;">
          <i *ngIf="item.status === 'Active'" class="pi pi-check text-green-500 text-xl"></i>
          <i *ngIf="item.status !== 'Active'" class="pi pi-times text-red-500 text-xl"></i>
        </td>
        <td style="text-align: center; vertical-align: middle;">
          <button class="text-blue-500 hover:text-blue-700 mr-2" (click)="openPage('edit', item)">
            <i class="pi pi-pencil"></i>
          </button>
          <button class="text-red-500 hover:text-red-700 mr-2" (click)="deleteTransaction(item.id)">
            <i class="pi pi-trash"></i>
          </button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<!-- Dialog -->
<p-dialog [(visible)]="visibleEdit" [modal]="true"
  [style]="{ width: '30vw', maxWidth: '30%', border: '1px solid #ccc' }"
  [contentStyle]="{ height: '100%', overflow: 'hidden' }" [draggable]="false" [resizable]="false">
  <div class="text-center">
    <div><i class="pi pi-info-circle" style="font-size: 6rem; opacity: 0.5;"></i></div>
    <div class="mt-4">{{ 'stockmainsearch.editUser' | translate }}</div>
  </div>

  <div class="mt-4">
    <input type="text" pInputText placeholder="{{ 'stockmainsearch.name' | translate }}"
      class="px-4 py-2 rounded-lg border w-full mb-2" [value]="selectedUser?.name" />
    <input type="text" pInputText placeholder="{{ 'stockmainsearch.role' | translate }}"
      class="px-4 py-2 rounded-lg border w-full" [value]="selectedUser?.role" />
  </div>

  <div class="text-center mt-4">
    <p-button [label]="'stockmainsearch.cancel' | translate" icon="pi pi-times"
      styleClass="p-button-secondary p-button-sm" size="small" (onClick)="onCloseEdit()"></p-button>

    <p-button [label]="'stockmainsearch.confirm' | translate" size="small" (onClick)="onConfirmEdit()"></p-button>
  </div>
</p-dialog>
