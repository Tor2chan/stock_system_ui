<div class="min-h-screen flex items-center justify-center bg-gray-100 relative overflow-hidden p-4">
  <!-- Background Layer: Light Gradient -->
  <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white via-gray-50 to-white opacity-95"></div>

  <div class="absolute inset-0 overflow-hidden">
    <div
      class="absolute w-[650px] h-[650px] rounded-full bg-cyan-200/50 shadow-lg shadow-blue-100 -left-60 -bottom-60 animate-pulse-slow">
    </div>
    <div
      class="absolute w-[750px] h-[750px] rounded-full bg-cyan-300/50 shadow-lg shadow-cyan-200 -right-60 -top-60 animate-pulse-slow delay-500">
    </div>
  </div>

  <!-- 🔤 Language Toggle Button (Top-right corner) -->
  <div class="absolute top-4 right-4 z-20 flex items-center gap-2">
    <span class="text-gray-700 text-sm font-semibold">{{ 'users.login.welcome' | translate }}</span>
    <p-button icon="pi pi-language" (click)="toggleLanguage()" rounded
      styleClass="p-button-text p-button-rounded text-gray-700 hover:text-indigo-600" tooltip="Change Language">
    </p-button>
  </div>

  <!-- Main Login Card (Light Glassmorphism) -->
  <div
    class="relative z-10 w-full max-w-sm bg-white/70 backdrop-blur-md rounded-3xl shadow-2xl shadow-gray-300/80 border border-gray-200 p-10 text-gray-900 transform transition-all duration-500 hover:scale-[1.02]">

    <!-- Logo -->
    <div class="flex justify-center mb-4">
      <p-image src="assets/imag/duck.png" alt="Logo" class="w-24 h-24"></p-image>
    </div>

    <!-- Header -->
    <h2 class="text-3xl font-extrabold text-gray-900 mb-2 text-center tracking-wider">
      {{ 'users.login.welcome' | translate }}
    </h2>
    <p class="text-gray-700 mb-8 text-center text-sm font-light whitespace-pre-line">
      {{ 'users.login.slogan' | translate }}
    </p>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-6">
      <!-- Username -->
      <div class="text-left">
        <label class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">
          {{ 'users.login.username' | translate }}
        </label>
        <div
          class="relative w-full border border-gray-300 rounded-xl overflow-hidden hover:border-indigo-400 transition duration-300">
          <input pInputText [(ngModel)]="username" name="username" placeholder="{{ 'users.login.username' | translate }}" (keyup.enter)="onSubmit()"
            class="w-full bg-white text-gray-900 placeholder-gray-500 border-none outline-none px-4 py-3"
            style="color-scheme: light;" />
        </div>
      </div>

      <!-- Password -->
      <div class="text-left">
        <label class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">
          {{ 'users.login.password' | translate }}
        </label>
        <div
          class="relative w-full border border-gray-300 rounded-xl overflow-hidden hover:border-indigo-400 transition duration-300">
          <p-password [(ngModel)]="password" name="password" [feedback]="false" [toggleMask]="true" (keyup.enter)="onSubmit()"
            placeholder="{{ 'users.login.password' | translate }}"
            inputStyleClass="w-full bg-white text-gray-900 placeholder-gray-500 border-none outline-none px-4 py-3"
            styleClass="w-full border-none"></p-password>
        </div>
      </div>

      <!-- Error -->
      <p *ngIf="errorMessage" class="text-red-600 text-sm text-left font-semibold">
        {{ errorMessage }}
      </p>

      <!-- Buttons -->
      <div class="flex flex-col items-center gap-3 w-full max-w-xs">
        <!-- ปุ่ม Login -->
           <p-button (click)="onSubmit() "[disabled]="isLoading"
            class="px-4 py-2 font-semibold transition gap-2 ml-2 ">
             {{ isLoading ? ('users.login.loggingIn' | translate) : ('users.login.login' | translate) }}
            </p-button>
             

      </div>


      <!-- Forgot Password -->
    
    </form>
  </div>
</div>
