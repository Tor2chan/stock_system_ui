<p-toast></p-toast>
<div class="min-h-screen flex items-center justify-center bg-[#FAF3E0] relative overflow-hidden p-4">

  <!-- Background Gradient -->
  <div class="absolute inset-0 bg-gradient-to-br 
              from-[#FAF3E0] via-[#F5E6D3] to-[#FAF3E0] opacity-95">
  </div>

  <!-- Background Decoration -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute w-[650px] h-[650px] rounded-full 
                bg-[#C8A165]/30 -left-60 -bottom-60 animate-pulse-slow">
    </div>
    <div class="absolute w-[750px] h-[750px] rounded-full 
                bg-[#6D4C41]/20 -right-60 -top-60 animate-pulse-slow delay-500">
    </div>
  </div>

  <!-- 🌍 Language Button -->
  <div class="absolute top-4 right-4 z-20 flex items-center gap-2">
    <span class="text-[#4E342E] text-sm font-semibold">
      {{ 'users.login.welcome' | translate }}
    </span>

    <p-button
      icon="pi pi-language"
      (click)="toggleLanguage()"
      rounded
      text
      styleClass="text-[#4E342E] hover:text-[#C8A165] transition">
    </p-button>
  </div>

  <!-- 🟤 Login Card -->
  <div class="relative z-10 w-full max-w-sm 
              bg-white/80 backdrop-blur-md 
              rounded-3xl shadow-2xl shadow-[#4E342E]/20 
              border border-[#E8D8C3] 
              p-10 text-[#4E342E] 
              transform transition-all duration-500 hover:scale-[1.02]">

    <!-- Logo -->
    <div class="flex justify-center mb-4">
      <p-image src="assets/imag/Punthailogo.png"
               alt="Logo"
               class="w-24 h-24 rounded-full border-2 border-[#C8A165]">
      </p-image>
    </div>

    <!-- Header -->
    <h2 class="text-3xl font-extrabold text-[#4E342E] mb-2 text-center tracking-wider">
      {{ 'users.login.welcome' | translate }}
    </h2>

    <p class="text-[#6D4C41] mb-8 text-center text-sm font-light whitespace-pre-line">
      {{ 'users.login.slogan' | translate }}
    </p>

    <!-- Form -->
    <form (ngSubmit)="onCheck()" #form="ngForm" class="space-y-6">

      <!-- Username -->
      <div>
        <label class="block text-sm mb-1 text-[#6D4C41] font-medium tracking-wider">
          {{ 'users.login.username' | translate }}
        </label>

        <div class="border border-[#E8D8C3] rounded-xl 
                    hover:border-[#C8A165] transition duration-300">

          <input pInputText
                 [(ngModel)]="username"
                 name="username"
                 (keyup.enter)="login()"
                 placeholder="{{ 'users.login.username' | translate }}"
                 class="w-full bg-white text-[#4E342E] 
                        placeholder-[#6D4C41]/60 
                        border-none outline-none px-4 py-3" />
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm mb-1 text-[#6D4C41] font-medium tracking-wider">
          {{ 'users.login.password' | translate }}
        </label>

        <div class="border border-[#E8D8C3] rounded-xl 
                    hover:border-[#C8A165] transition duration-300">

          <p-password
            [(ngModel)]="password"
            name="password"
            [feedback]="false"
            [toggleMask]="true"
            (keyup.enter)="login()"
            placeholder="{{ 'users.login.password' | translate }}"
            inputStyleClass="w-full bg-white text-[#4E342E] placeholder-[#6D4C41]/60 border-none outline-none px-4 py-3"
            styleClass="w-full border-none">
          </p-password>
        </div>
      </div>

      <!-- Error -->
      <p *ngIf="errorMessage" class="text-red-600 text-sm font-semibold">
        {{ errorMessage }}
      </p>

      <!-- Login Button -->
      <p-button
        (click)="login()"
        [disabled]="isLoading"
        styleClass="w-full bg-[#4E342E] hover:bg-[#6D4C41] 
                    text-[#F5E6D3] border-none 
                    rounded-xl py-3 font-semibold 
                    transition duration-300">
        {{ isLoading ? ('users.login.loggingIn' | translate) 
                     : ('users.login.login' | translate) }}
      </p-button>
      <p class="text-[#6D4C41] mb-8 text-center text-sm font-light whitespace-pre-line">
     v.0.0.01
    </p>


    </form>
  </div>
</div>
