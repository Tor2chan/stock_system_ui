<div class="min-h-screen flex items-center justify-center bg-gray-100 relative overflow-hidden p-4">
  <!-- Background Layer: Light Gradient -->
  <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white via-gray-50 to-white opacity-95"></div>

  <!-- Decorative Circles (Light glass effect) -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
    <div class="absolute w-[650px] h-[650px] rounded-full bg-gray-100/50 shadow-inner shadow-gray-200 -left-60 -bottom-60 animate-pulse-slow"></div>
    <div class="absolute w-[750px] h-[750px] rounded-full bg-gray-200/50 shadow-lg shadow-gray-300 -right-60 -top-60 animate-pulse-slow delay-500"></div>
  </div>

  <!-- 🔤 Language Toggle Button (Top-right corner) -->
  <div class="absolute top-4 right-4 z-20 flex items-center gap-2">
    <span class="text-gray-700 text-sm font-semibold">{{ 'login.welcome' | translate }}</span>
    <p-button 
      icon="pi pi-language" 
      (click)="toggleLanguage()" 
      rounded 
      styleClass="p-button-text p-button-rounded text-gray-700 hover:text-indigo-600"
      tooltip="Change Language">
    </p-button>
  </div>

  <!-- Main Login Card (Light Glassmorphism) -->
  <div class="relative z-10 w-full max-w-sm bg-white/70 backdrop-blur-md rounded-3xl shadow-2xl shadow-gray-300/80 border border-gray-200 p-10 text-gray-900 transform transition-all duration-500 hover:scale-[1.02]">
    
    <!-- Logo -->
    <div class="mb-10 flex justify-center">
      <div class="flex items-center justify-center w-28 h-28 rounded-full bg-gradient-to-br from-indigo-500 to-purple-400 shadow-2xl shadow-indigo-500/70 border-4 border-white/80 transform hover:scale-105 transition-all duration-300">
        <i class="pi pi-shopping-cart text-6xl text-white"></i>
      </div>
    </div>

    <!-- Header -->
    <h2 class="text-3xl font-extrabold text-gray-900 mb-2 text-center tracking-wider">
      {{ 'login.welcome' | translate }}
    </h2>
    <p class="text-gray-700 mb-8 text-center text-sm font-light whitespace-pre-line">
      {{ 'login.slogan' | translate }}
    </p>

    <!-- Login Form -->
    <form (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-6">
      <!-- Username -->
      <div class="text-left">
        <label class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">
          {{ 'login.username' | translate }}
        </label>
        <div class="relative w-full border border-gray-300 rounded-xl overflow-hidden hover:border-indigo-400 transition duration-300">
            <input
            pInputText
            [(ngModel)]="username"
            name="username"
            placeholder="{{ 'login.username' | translate }}"
            class="w-full bg-white text-gray-900 placeholder-gray-500 border-none outline-none px-4 py-3"
            style="color-scheme: light;"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="text-left">
        <label class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">
          {{ 'login.password' | translate }}
        </label>
        <div class="relative w-full border border-gray-300 rounded-xl overflow-hidden hover:border-indigo-400 transition duration-300">
            <p-password
            [(ngModel)]="password"
            name="password"
            [feedback]="false"
            [toggleMask]="true"
            placeholder="{{ 'login.password' | translate }}"
            inputStyleClass="w-full bg-white text-gray-900 placeholder-gray-500 border-none outline-none px-4 py-3"
            styleClass="w-full border-none"
          ></p-password>
        </div>
      </div>

      <!-- Error -->
      <p *ngIf="errorMessage" class="text-red-600 text-sm text-left font-semibold">
        {{ errorMessage }}
      </p>

      <!-- Buttons -->
      <div class="space-y-4 flex flex-col items-center">
        <!-- Login Button (Primary Action - Indigo) -->
        <p-button
          type="submit"
          [disabled]="isLoading"
          [label]="isLoading ? ('login.loggingIn' | translate) : ('login.login' | translate)"
          icon="pi pi-sign-in"
          styleClass="w-full rounded-xl text-indigo-600 font-semibold tracking-wider py-3.5 border border-indigo-400 
                 bg-white hover:bg-indigo-50 shadow-lg shadow-indigo-200/50 transition-all duration-300"
        ></p-button>

        <!-- Sign Up Button (Secondary Action - Purple/Outline Style) -->
        <p-button
          type="button"
          [label]="'login.signUp' | translate"
          icon="pi pi-user-plus"
          styleClass="w-full rounded-xl text-indigo-600 font-semibold tracking-wider py-3.5 border border-indigo-400 
                 bg-white hover:bg-indigo-50 shadow-lg shadow-indigo-200/50 transition-all duration-300"
          (onClick)="goToRegister()"
        ></p-button>
      </div>

      <!-- Forgot Password -->
      <div class="mt-4 text-center">
        <a routerLink="/forgot-password"
          class="text-gray-600 text-sm hover:underline hover:text-gray-700 transition-all duration-300 font-light">
          {{ 'login.forgot' | translate }}
        </a>
      </div>
    </form>
  </div>
</div>
