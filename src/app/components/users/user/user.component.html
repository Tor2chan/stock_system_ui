<div class="min-h-screen flex items-center justify-center bg-gray-100 relative overflow-hidden p-4">
  <!-- Background Layer: Light Gradient และ Overlay -->
  <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white via-gray-50 to-white opacity-95"></div>

  <!-- Decorative Circles -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
    <div class="absolute w-[650px] h-[650px] rounded-full bg-gray-100/50 shadow-inner shadow-gray-200 -left-60 -bottom-60"></div>
    <div class="absolute w-[750px] h-[750px] rounded-full bg-gray-200/50 shadow-lg shadow-gray-300 -right-60 -top-60"></div>
  </div>

  <!-- Main Profile Card (Glassmorphism Light Card) -->
  <p-card [styleClass]="'relative z-10 w-full max-w-4xl bg-white/70 backdrop-blur-md rounded-3xl shadow-2xl shadow-gray-300/80 border border-gray-200 p-10 text-black transform transition-all duration-500 hover:scale-[1.005]'">

    <!-- Header Section: Name and Buttons -->
    <div class="flex flex-col md:flex-row items-center justify-between mb-8 border-b border-gray-200 pb-6">
      
      <div class="flex items-center gap-4">
        <!-- Profile Title -->
        <div class="text-3xl font-extrabold text-gray-900 tracking-wider">
          {{ user.firstName }} {{ user.lastName }}
        </div>
      </div>

      <!-- ปุ่มแก้ไข/บันทึก/ยกเลิก -->
      <div class="mt-4 md:mt-0 flex gap-2">
        <p-button 
          *ngIf="!isEditing" 
          (onClick)="toggleEdit()" 
          label="แก้ไขโปรไฟล์" 
          icon="pi pi-pencil" 
          styleClass="p-button-secondary p-button-outlined text-indigo-600 border-indigo-600 hover:bg-indigo-600 hover:text-white transition-all duration-300">
        </p-button>
        
        <ng-container *ngIf="isEditing">
          <p-button 
            (onClick)="saveChanges()" 
            label="บันทึก" 
            icon="pi pi-check" 
            styleClass="bg-green-600 border-green-600 hover:bg-green-700 shadow-lg shadow-green-300/50 mr-2">
          </p-button>
          <p-button 
            (onClick)="cancelEdit()" 
            label="ยกเลิก" 
            icon="pi pi-times" 
            styleClass="p-button-text text-gray-700 hover:bg-gray-100">
          </p-button>
        </ng-container>
      </div>
    </div>

    <!-- Profile Details / Edit Form -->
    <div class="space-y-8">
      
      <!-- General Info: Name, Email, Phone -->
      <section class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-6">

        <!-- ชื่อจริง -->
        <div>
          <label for="firstName" class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">ชื่อจริง</label>
          <ng-container *ngIf="!isEditing; else editFirstName">
            <p class="text-lg font-semibold text-gray-900 p-3 bg-gray-50 rounded-xl border border-gray-300">{{ user.firstName }}</p>
          </ng-container>
          <ng-template #editFirstName>
            <input 
              pInputText 
              id="firstName" 
              value="{{ editableUser.firstName }}" 
              class="w-full bg-white text-gray-900 placeholder-gray-500 border border-gray-300 px-4 py-3 rounded-xl transition-all duration-300 focus:border-indigo-600" 
              style="color-scheme: light;"
            />
          </ng-template>
        </div>

        <!-- นามสกุล -->
        <div>
          <label for="lastName" class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">นามสกุล</label>
          <ng-container *ngIf="!isEditing; else editLastName">
            <p class="text-lg font-semibold text-gray-900 p-3 bg-gray-50 rounded-xl border border-gray-300">{{ user.lastName }}</p>
          </ng-container>
          <ng-template #editLastName>
            <input 
              pInputText 
              id="lastName" 
              value="{{ editableUser.lastName }}"
              class="w-full bg-white text-gray-900 placeholder-gray-500 border border-gray-300 px-4 py-3 rounded-xl transition-all duration-300 focus:border-indigo-600" 
              style="color-scheme: light;"
            />
          </ng-template>
        </div>

        <!-- อีเมล -->
        <div>
          <label for="email" class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">อีเมล</label>
          <ng-container *ngIf="!isEditing; else editEmail">
            <p class="text-lg font-semibold text-gray-900 p-3 bg-gray-50 rounded-xl border border-gray-300">{{ user.email }}</p>
          </ng-container>
          <ng-template #editEmail>
            <input 
              pInputText 
              id="email" 
              type="email" 
              value="{{ editableUser.email }}"
              class="w-full bg-white text-gray-900 placeholder-gray-500 border border-gray-300 px-4 py-3 rounded-xl transition-all duration-300 focus:border-indigo-600" 
              style="color-scheme: light;"
            />
          </ng-template>
        </div>

        <!-- เบอร์โทรศัพท์ -->
        <div>
          <label for="phoneNumber" class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">เบอร์โทรศัพท์</label>
          <ng-container *ngIf="!isEditing; else editPhoneNumber">
            <p class="text-lg font-semibold text-gray-900 p-3 bg-gray-50 rounded-xl border border-gray-300">{{ user.phoneNumber }}</p>
          </ng-container>
          <ng-template #editPhoneNumber>
            <input 
              pInputText 
              id="phoneNumber" 
              value="{{ editableUser.phoneNumber }}"
              class="w-full bg-white text-gray-900 placeholder-gray-500 border border-gray-300 px-4 py-3 rounded-xl transition-all duration-300 focus:border-indigo-600" 
              placeholder="08X-XXX-XXXX"
              style="color-scheme: light;"
            />
          </ng-template>
        </div>
      </section>
      <!-- Bio Section -->
      <section class="col-span-1 md:col-span-2">
        <h3 class="text-xl font-bold text-gray-800 border-b border-gray-200 pb-2 mb-4">ประวัติส่วนตัว</h3>
        <label for="bio" class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">ประวัติส่วนตัว</label>
        <ng-container *ngIf="!isEditing; else editBio">
          <!-- Display Field Style -->
          <p class="text-gray-900 p-3 bg-gray-50 rounded-xl border border-gray-300 whitespace-pre-wrap">{{ user.bio }}</p>
        </ng-container>
        <ng-template #editBio>
          <!-- Textarea Field Style -->
          <textarea 
            pInputTextarea 
            id="bio" 
            [autoResize]="true" 
            rows="5" 
            class="w-full bg-white text-gray-900 placeholder-gray-500 border border-gray-300 px-4 py-3 rounded-xl transition-all duration-300 focus:border-indigo-600"
            style="color-scheme: light;"
          >{{ editableUser.bio }}</textarea>
        </ng-template>
      </section>

    </div> <!-- End of space-y-8 -->

  </p-card>
</div>
