<div class="min-h-screen flex items-center justify-center bg-gray-100 relative overflow-hidden p-4">
  <!-- Background Layer: Light Gradient -->
  <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-white via-gray-50 to-white opacity-95"></div>

  <!-- Decorative Orbs (Light glass effect) -->
  <div class="absolute inset-0 overflow-hidden">
    <div
      class="absolute w-[650px] h-[650px] rounded-full bg-cyan-200/50 shadow-lg shadow-blue-100 -left-60 -bottom-60 animate-pulse-slow">
    </div>
    <div
      class="absolute w-[750px] h-[750px] rounded-full bg-cyan-300/50 shadow-lg shadow-cyan-200 -right-60 -top-60 animate-pulse-slow delay-500">
    </div>
  </div>
  
  <!-- 🔤 Language Toggle Button (Top-right corner) -->
  <div class="absolute top-4 right-4 z-20 flex items-center gap-2">
    <p-button 
      icon="pi pi-language" 
      (click)="toggleLanguage()" 
      rounded 
      styleClass="p-button-text p-button-rounded text-gray-700 hover:text-indigo-600"
      tooltip="Change Language">
    </p-button>
  </div>

  <!-- Main Forgot Password Card (Light Glassmorphism) -->
  <div class="relative z-10 w-full max-w-md bg-white/70 backdrop-blur-md rounded-3xl shadow-2xl shadow-gray-300/80 border border-gray-200 p-8 sm:p-10 text-gray-900 transform transition-all duration-500 hover:scale-[1.02]">
    
    <!-- Icon and Header Section -->
    <div class="mb-8 flex justify-center">
          <!-- Logo -->
    <div class="flex justify-center mb-4">
      <p-image src="assets/imag/duck.png" alt="Logo" class="w-24 h-24"></p-image>
    </div>
    </div>
    
    <h2 class="text-3xl font-extrabold text-gray-900 mb-2 text-center tracking-wider">
        {{ 'forgot.title' | translate }}
    </h2>
    <p class="text-gray-700 mb-8 text-center text-sm font-light">
        {{ 'forgot.description' | translate }}
    </p>

    <!-- Message Alerts -->
    <div class="space-y-4 mb-4">
        <p-message *ngIf="errorMessage" severity="error" [text]="errorMessage | translate" class="block"></p-message>
        <p-message *ngIf="successMessage" severity="success" [text]="successMessage | translate" class="block"></p-message>
    </div>

    <!-- Form Start -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <!-- Email -->
        <div class="text-left">
            <label for="email" class="block text-sm mb-1 text-gray-700 font-medium tracking-wider">
              {{ 'forgot.emailLabel' | translate }}
            </label>
            <div class="relative p-input-icon-left w-full border border-gray-300 rounded-xl overflow-hidden hover:border-indigo-400 transition duration-300">
                <i class="text-gray-500 ml-3 z-20 absolute top-1/2 -translate-y-1/2"></i>
                <input 
                    id="email" 
                    type="email" 
                    pInputText 
                    formControlName="email" 
                    placeholder="{{ 'forgot.emailPlaceholder' | translate }}"
                    class="w-full bg-white text-gray-900 placeholder-gray-500 border-none outline-none px-4 py-3 pl-10"
                    style="color-scheme: light;"
                >
            </div>
            <small class="p-error block mt-1 text-red-600" 
                *ngIf="f['email'].invalid && (f['email'].dirty || f['email'].touched)">
                <span *ngIf="f['email'].errors?.['required']">{{ 'forgot.errorRequired' | translate }}</span>
                <span *ngIf="f['email'].errors?.['email']">{{ 'forgot.errorInvalidEmail' | translate }}</span>
            </small>
        </div>

        <!-- Send Link Button -->
        <div class="space-y-4 flex flex-col items-center pt-4">
            <p-button 
                label="{{ 'forgot.sendLink' | translate }}" 
                type="submit" 
                styleClass="w-full rounded-xl font-bold tracking-wider py-3.5 text-white transition-all duration-300 shadow-xl shadow-purple-300/70 hover:shadow-2xl hover:scale-[1.01] bg-purple-600 hover:bg-purple-700"
                [disabled]="forgotPasswordForm.invalid"
            ></p-button>
        </div>

    </form>
    <!-- Form End -->

    <!-- Links Section -->
    <div class="mt-8 text-center text-sm">
        <a routerLink="/login" class="text-indigo-600 hover:text-indigo-700 font-semibold cursor-pointer transition duration-200">
          {{ 'forgot.backToLogin' | translate }}
        </a>
    </div>
    
  </div>
</div>
