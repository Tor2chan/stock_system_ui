<div class="bg-gray-100 min-h-screen p-6">
  <div class="max-w-5xl mx-auto bg-white rounded-lg shadow p-6">
    <h2 class="text-2xl font-bold mb-4">Transactions</h2>

    <!-- Filters -->
    <div class="flex flex-wrap gap-2 mb-4 items-center">
      <button (click)="filterType('all')" [ngClass]="{'bg-blue-500 text-white': selectedFilter==='all'}"
        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold transition">
        All
      </button>
      <button (click)="filterType('income')" [ngClass]="{'bg-blue-500 text-white': selectedFilter==='income'}"
        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold transition">
        Income
      </button>
      <button (click)="filterType('expense')" [ngClass]="{'bg-blue-500 text-white': selectedFilter==='expense'}"
        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold transition">
        Expense
      </button>

      <select [(ngModel)]="filterCategory" (change)="filterByCategory()" class="px-4 py-2 rounded-lg border">
        <option value="">Filter by Category</option>
        <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
      </select>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
      <table class="min-w-full border border-gray-300 rounded-lg">
        <thead class="bg-gray-100 border-b border-gray-300">
          <tr>
            <th class="px-4 py-2 text-left">No</th>
            <th class="px-4 py-2 text-left">Date</th>
            <th class="px-4 py-2 text-left">Category</th>
            <th class="px-4 py-2 text-left">Amount</th>
            <th class="px-4 py-2 text-left">Type</th>
            <th class="px-4 py-2 text-center">Manage</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let t of paginatedTransactions; let i = index" class="border-b border-gray-200 hover:bg-gray-50">
            <td class="px-4 py-2">{{ (page-1)*pageSize + i + 1 }}</td>
            <td class="px-4 py-2">{{ t.date }}</td>
            <td class="px-4 py-2">{{ t.category }}</td>
            <td class="px-4 py-2">${{ t.amount | number:'1.2-2' }}</td>
            <td class="px-4 py-2">{{ t.type }}</td>
            <td class="px-4 py-2 text-center">
              <button class="text-blue-500 hover:text-blue-700 mr-2" (click)="editTransaction(t)">
                <i class="pi pi-pencil"></i>
              </button>
              <button class="text-red-500 hover:text-red-700" (click)="deleteTransaction(t.id)">
                <i class="pi pi-trash"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="flex justify-end items-center mt-4">
      <p class="mr-4">Page {{ page }} of {{ totalPages }}</p>
      <button (click)="prevPage()" [disabled]="page===1"
        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold mr-2">
        Prev
      </button>
      <button (click)="nextPage()" [disabled]="page===totalPages"
        class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 font-semibold">
        Next
      </button>
    </div>
  </div>
</div>
