<!-- Layout Container -->
<div class="layout-main min-h-screen flex flex-col bg-gray-100">

  <!-- 🔝 Top Menubar -->
  <div class="menubar-header flex items-center justify-between bg-gray-300 shadow-md px-6 py-3">

    <!-- โลโก้หรือชื่อระบบ -->
<div class="flex items-center gap-3 px-4 py-3 cursor-pointer select-none" routerLink="/stock-search">
  <div class="flex items-center gap-2">
    <i class="pi pi-box text-2xl text-primary"></i>
    <span class="text-2xl font-bold text-gray-700 tracking-wide">EZ<span class="text-primary">Stock</span></span>
  </div>
</div>
  

    <!-- ปุ่มด้านขวา -->
    <div class="flex items-center gap-3">
      <p-button
        icon="pi pi-language"
        rounded
        text
        pTooltip="Change Language"
        tooltipPosition="bottom"
        (click)="toggleLanguage()">
      </p-button>

      <p-button
        icon="pi pi-user"
        rounded
        text
        pTooltip="User Profile"
        tooltipPosition="bottom"
        (click)="goToUser()">
      </p-button>

      <p-button
        icon="pi pi-sign-out"
        
        rounded
        text
        pTooltip="Logout"
        tooltipPosition="bottom"
        (click)="goOutUser()">
      </p-button>
    </div>
  </div>

  <!-- 📦 Main Content -->
  <div class="flex-1 mt-2">
    <router-outlet></router-outlet>
  </div>

  <!-- ⚓ Footer -->
  <app-footer></app-footer>

</div>
