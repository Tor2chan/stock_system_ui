<!-- Layout Container -->
<div class="layout-main min-h-screen flex flex-col bg-[#FAF3E0]">

  <!-- 🔝 Top Menubar -->
  <div class="menubar-header flex items-center justify-between 
              bg-[#4E342E] text-[#F5E6D3] shadow-md px-6 py-3">

    <!-- ฝั่งซ้าย -->
    <div class="flex items-center gap-3">
      <p-button icon="pi pi-bars" rounded text 
                class="text-[#F5E6D3] hover:text-[#C8A165] transition"
                (click)="visibleSidebar=true">
      </p-button>

      <div class="flex items-center gap-3 cursor-pointer select-none" 
           routerLink="/stock-main-search">

        <p-image src="assets/imag/duck.png" 
                 alt="Logo" 
                 class="w-10 h-10 rounded-full border border-[#C8A165]">
        </p-image>

        <span class="text-2xl font-bold tracking-wide">
          Easy<span class="text-[#C8A165]">Stock</span>
        </span>
      </div>
    </div>

    <!-- ปุ่มด้านขวา -->
    <div class="flex items-center gap-3 ">
      <p-button icon="pi pi-language" 
                rounded text 
                class="text-[#F5E6D3] hover:text-[#C8A165] transition"
                (click)="toggleLanguage()">
      </p-button>

      <p-button icon="pi pi-sign-out" 
                rounded text 
                class="text-[#F5E6D3] hover:text-[#C8A165] transition"
                (click)="goOutUser()">
      </p-button>
    </div>
  </div>

  <!-- 🟤 Sidebar -->
  <p-sidebar [(visible)]="visibleSidebar" 
             position="left" 
             class="w-64 bg-[#F5E6D3]"
             [showCloseIcon]="false">

    <!-- Header Sidebar -->
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-2 cursor-pointer"
           routerLink="/stock-main-search">
        <p-image src="assets/imag/duck.png" 
                 class="w-8 h-8"></p-image>

        <span class="text-xl font-bold text-[#4E342E]">
          Easy<span class="text-[#6D4C41]">Stock</span>
        </span>
      </div>

      <p-button icon="pi pi-times" text rounded 
                class="text-[#6D4C41]"
                (click)="visibleSidebar=false">
      </p-button>
    </div>

    <h2 class="text-lg font-semibold mb-3 text-[#4E342E]">
      {{ 'main.menu.menu' | translate }}
    </h2>

    <ul class="flex flex-col gap-1 text-[#4E342E]">

      <li>
        <a routerLink="/stock-main-search"
           (click)="visibleSidebar=false"
           class="flex items-center gap-2 p-2 rounded 
                  hover:bg-[#E8D8C3] transition">
          <i class="pi pi-home"></i>
          <span>{{ 'main.menu.home' | translate }}</span>
        </a>
      </li>

      <li>
        <a routerLink="/stock-main-dashboard"
           (click)="visibleSidebar=false"
           class="flex items-center gap-2 p-2 rounded 
                  hover:bg-[#E8D8C3] transition">
          <i class="pi pi-chart-bar"></i>
          <span>{{ 'main.menu.dashboard' | translate }}</span>
        </a>
      </li>
      <div *ngIf="role=='admin' || role=='staff' ">
       <li>
        <a routerLink="/report"
           (click)="visibleSidebar=false"
           class="flex items-center gap-2 p-2 rounded 
                  hover:bg-[#E8D8C3] transition">
          <i class="pi pi-file"></i>
          <span>{{ 'main.menu.report' | translate }}</span>
        </a>
      </li>
</div>
<div *ngIf="role=='admin' ">
      <li>
        <a routerLink="/edit-user"
           (click)="visibleSidebar=false"
           class="flex items-center gap-2 p-2 rounded 
                  hover:bg-[#E8D8C3] transition">
          <i class="pi pi-cog"></i>
          <span>{{ 'main.menu.sitting' | translate }}</span>
        </a>
      </li>
      </div>

      <li>
        <a routerLink="/login"
           (click)="visibleSidebar=false"
           class="flex items-center gap-2 p-2 rounded 
                  hover:bg-[#E8D8C3] text-red-600 transition">
          <i class="pi pi-sign-out"></i>
          <span>{{ 'main.menu.logout' | translate }}</span>
        </a>
      </li>

    </ul>
  </p-sidebar>

  <!-- 📦 Main Content -->
  <div class="flex-1 mt-2">
    <router-outlet></router-outlet>
  </div>

  <!-- ⚓ Footer -->
  <app-footer></app-footer>

</div>
